services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: mastra_pubsub
    ports:
      - "5544:5432"
    volumes:
      - mastra_pubsub_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mastra_pubsub"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  mastra_pubsub_data:
