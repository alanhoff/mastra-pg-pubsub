name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mastra_pubsub
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mastra_pubsub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5544/mastra_pubsub
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run test:cluster
      - run: npm run test:coverage
      - run: npm run build
      - run: npm pack --dry-run

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mastra_pubsub
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mastra_pubsub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5544/mastra_pubsub
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - name: Run key-free PubSub semantics e2e
        run: npm run test:e2e:semantics
      - name: Skip OpenAI-backed Mastra e2e without OpenAI key
        if: env.OPENAI_API_KEY == ''
        run: echo "OPENAI_API_KEY is not configured; skipping OpenAI-backed Mastra e2e."
      - name: Run OpenAI-backed Mastra e2e
        if: env.OPENAI_API_KEY != ''
        run: |
          trap 'rm -f .env' EXIT
          printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" > .env
          npm run test:e2e:mastra
